---
# Server to connect to as a VPN node
# Config-specific
secrets_files:
  - vpn-server-1

# Hypervisor-specific
proxmox_host: pve1.int-net.saphnet.xyz
proxmox_host_port: 8006
proxmox_node: pve1
vm_id: 104
vm_name: vpn-server-1
vm_description: NixOS VM serving as a VPN node
mac_addr: BC:24:11:DE:71:04
ip_addr: 192.168.8.63
ip_addr_range: 23
ip_gateway: 192.168.8.1
ssh_port: 22
cpu_cores: 2
ram_total: 1024 # Is in MiB
disk_size: 48 # Is in GiB
vm_storage: local-zfs
iso_storage: sdcard
iso_directory: /mnt/sdcard/template/iso # Matches "sdcard"
uses_impermanence: true
uses_sopsnix: true
uses_cloudinit: true

vm_config:
  # Main
  tags: nixos

  # cloud-init
  citype: nocloud # "nocloud" for Linux, "configdrive2" for Windows

disks:
  - vmid: "{{ vm_id }}" # Main drive
    disk: scsi0
    storage: "{{ vm_storage }}"
    size: "{{ disk_size }}"
    mbps_rd: 375 # We use SATA SSDs, so we want to stick to 3Gbps to avoid hogging disk IO
    mbps_wr: 375

# System-specific
nixos_config_name: "vpn-server-1" # Make sure group_vars/nixos_vms.yaml is imported first
